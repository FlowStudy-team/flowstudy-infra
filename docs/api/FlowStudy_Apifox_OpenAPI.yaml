openapi: 3.0.3
info:
  title: FlowStudy API
  version: 1.0.0
  description: FlowStudy 前后端对接接口文档，可导入 Apifox。当前根据 flowstudy-web 前端 mock API 和 TypeScript 类型整理。
servers:
  - url: http://localhost:8080
    description: Local backend
  - url: https://api.flowstudy.example.com
    description: Production placeholder
security:
  - bearerAuth: []

tags:
  - name: Auth
    description: 登录注册
  - name: Articles
    description: 文章与一周热点
  - name: OJ
    description: 在线判题
  - name: Documents
    description: 文档中心
  - name: Profile
    description: 个人中心
  - name: AI
    description: AI 助手

paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: 登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthResponse'

  /api/auth/register:
    post:
      tags: [Auth]
      summary: 注册
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthResponse'

  /api/articles:
    get:
      tags: [Articles]
      summary: 获取文章列表
      security: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          description: 文章分页列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ArticlePageResult'

  /api/articles/{articleId}:
    get:
      tags: [Articles]
      summary: 获取文章详情
      security: []
      parameters:
        - name: articleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 文章详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ArticleDetail'

  /api/articles/{articleId}/chapters/{chapterId}:
    get:
      tags: [Articles]
      summary: 获取章节详情
      security: []
      parameters:
        - name: articleId
          in: path
          required: true
          schema:
            type: string
        - name: chapterId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 章节详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ChapterDetail'

  /api/oj/problems/{problemId}:
    get:
      tags: [OJ]
      summary: 获取 OJ 题目详情
      security: []
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OJ 题目详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OJProblem'

  /api/oj/languages:
    get:
      tags: [OJ]
      summary: 获取 OJ 支持语言
      security: []
      responses:
        '200':
          description: 支持语言列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/OJLanguageOption'

  /api/oj/problems/{problemId}/run:
    post:
      tags: [OJ]
      summary: 运行代码
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunCodeRequest'
      responses:
        '200':
          description: 运行结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OJJudgeResult'

  /api/oj/problems/{problemId}/submit:
    post:
      tags: [OJ]
      summary: 提交代码
      parameters:
        - name: problemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunCodeRequest'
      responses:
        '200':
          description: 提交结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OJJudgeResult'

  /api/document/categories:
    get:
      tags: [Documents]
      summary: 获取文档分类
      responses:
        '200':
          description: 文档分类树
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DocumentCategory'

  /api/document/folders:
    get:
      tags: [Documents]
      summary: 获取文档文件夹树
      responses:
        '200':
          description: 文件夹树
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DocumentFolder'
    post:
      tags: [Documents]
      summary: 新建文档文件夹
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentFolderPayload'
      responses:
        '200':
          description: 新建后的文件夹
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DocumentFolder'

  /api/documents:
    get:
      tags: [Documents]
      summary: 获取文档列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
        - name: folderId
          in: query
          schema:
            type: integer
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: tag
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/DocumentStatus'
      responses:
        '200':
          description: 文档列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DocumentListResult'
    post:
      tags: [Documents]
      summary: 新建文档
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentPayload'
      responses:
        '200':
          description: 新建后的文档详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DocumentDetail'

  /api/documents/{id}:
    get:
      tags: [Documents]
      summary: 获取文档详情
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: 文档详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DocumentDetail'
    patch:
      tags: [Documents]
      summary: 更新文档
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentPayload'
      responses:
        '200':
          description: 更新后的文档详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DocumentDetail'
    delete:
      tags: [Documents]
      summary: 删除文档
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          success:
                            type: boolean
                            example: true

  /api/documents/{id}/publish:
    post:
      tags: [Documents]
      summary: 发布文档
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishDocumentPayload'
      responses:
        '200':
          description: 发布后的文档详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DocumentDetail'

  /api/me/profile:
    get:
      tags: [Profile]
      summary: 获取个人概要
      responses:
        '200':
          description: 个人概要
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProfileSummary'

  /api/me/activities/recent:
    get:
      tags: [Profile]
      summary: 获取最近学习活动
      responses:
        '200':
          description: 最近学习活动
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/LearningActivity'

  /api/me/submissions:
    get:
      tags: [Profile]
      summary: 获取我的提交列表
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Keyword'
      responses:
        '200':
          description: 我的提交分页列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubmissionPageResult'

  /api/ai/chat:
    post:
      tags: [AI]
      summary: AI 助手提问
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskAiRequest'
      responses:
        '200':
          description: AI 回复
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AiMessage'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    Keyword:
      name: keyword
      in: query
      schema:
        type: string
    DocumentId:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    ApiResponse:
      type: object
      required: [code, message, data]
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          nullable: true

    AuthRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: learner@flowstudy.dev
        password:
          type: string
          format: password
          example: '123456'
        confirmPassword:
          type: string
          format: password
          example: '123456'

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: login-token-xxx
        message:
          type: string
          example: Login successful.

    PageResultBase:
      type: object
      required: [list, total, page, pageSize]
      properties:
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    ArticleDifficulty:
      type: string
      enum: [Beginner, Intermediate, Advanced]

    Article:
      type: object
      required: [id, title, tags, difficulty, updatedAt]
      properties:
        id:
          type: string
          example: a1
        title:
          type: string
        tags:
          type: array
          items:
            type: string
        difficulty:
          $ref: '#/components/schemas/ArticleDifficulty'
        updatedAt:
          type: string
          example: '2026-05-28'

    ArticlePageResult:
      allOf:
        - $ref: '#/components/schemas/PageResultBase'
        - type: object
          properties:
            list:
              type: array
              items:
                $ref: '#/components/schemas/Article'

    Chapter:
      type: object
      required: [id, title, problemIds]
      properties:
        id:
          type: string
        title:
          type: string
        problemIds:
          type: array
          items:
            type: string

    ArticleDetail:
      type: object
      required: [id, title, markdown, chapters]
      properties:
        id:
          type: string
        title:
          type: string
        markdown:
          type: string
        chapters:
          type: array
          items:
            $ref: '#/components/schemas/Chapter'

    ChapterDetail:
      type: object
      required: [id, articleId, title, markdown, problemIds]
      properties:
        id:
          type: string
        articleId:
          type: string
        title:
          type: string
        markdown:
          type: string
        problemIds:
          type: array
          items:
            type: string

    OJLanguage:
      type: string
      enum: [java, cpp, python, javascript]

    OJDifficulty:
      type: string
      enum: [简单, 中等, 困难]

    OJProblem:
      type: object
      required: [id, title, difficulty, description, inputDesc, outputDesc, samples, constraints, tags]
      properties:
        id:
          type: string
        title:
          type: string
        difficulty:
          $ref: '#/components/schemas/OJDifficulty'
        description:
          type: string
        inputDesc:
          type: string
        outputDesc:
          type: string
        samples:
          type: array
          items:
            type: object
            required: [input, output]
            properties:
              input:
                type: string
              output:
                type: string
              explanation:
                type: string
        constraints:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string

    OJLanguageOption:
      type: object
      required: [value, label, template, monacoLanguage]
      properties:
        value:
          $ref: '#/components/schemas/OJLanguage'
        label:
          type: string
          example: Java
        template:
          type: string
        monacoLanguage:
          $ref: '#/components/schemas/OJLanguage'

    RunCodeRequest:
      type: object
      required: [language, code]
      properties:
        language:
          $ref: '#/components/schemas/OJLanguage'
        code:
          type: string

    OJResultStatus:
      type: string
      enum: [PENDING, COMPILING_ERROR, RUNTIME_ERROR, WRONG_ANSWER, ACCEPTED]

    OJTestCaseResult:
      type: object
      required: [index, input, expected, output, status]
      properties:
        index:
          type: integer
        input:
          type: string
        expected:
          type: string
        output:
          type: string
        status:
          $ref: '#/components/schemas/OJResultStatus'
        message:
          type: string

    OJJudgeResult:
      type: object
      required: [status, message, testCases]
      properties:
        status:
          $ref: '#/components/schemas/OJResultStatus'
        message:
          type: string
        runtimeMs:
          type: integer
        memoryKb:
          type: integer
        compileError:
          type: string
        runtimeError:
          type: string
        testCases:
          type: array
          items:
            $ref: '#/components/schemas/OJTestCaseResult'

    DocumentStatus:
      type: string
      enum: [draft, private, published, archived]

    DocumentCategory:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        parentId:
          type: integer
        children:
          type: array
          items:
            $ref: '#/components/schemas/DocumentCategory'

    DocumentFolder:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        parentId:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        children:
          type: array
          items:
            $ref: '#/components/schemas/DocumentFolder'

    CreateDocumentFolderPayload:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: 算法专题
        parentId:
          type: integer

    DocumentItem:
      type: object
      required: [id, title, tags, status, updatedAt, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        summary:
          type: string
        folderId:
          type: integer
        folderName:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          $ref: '#/components/schemas/DocumentStatus'
        updatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        publishedAt:
          type: string
          format: date-time

    DocumentDetail:
      allOf:
        - $ref: '#/components/schemas/DocumentItem'
        - type: object
          required: [content]
          properties:
            content:
              type: string
              description: Markdown 内容

    DocumentListResult:
      type: object
      required: [list, total]
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/DocumentItem'
        total:
          type: integer

    CreateDocumentPayload:
      type: object
      required: [title]
      properties:
        title:
          type: string
        content:
          type: string
        folderId:
          type: integer
        categoryId:
          type: integer
        tags:
          type: array
          items:
            type: string

    UpdateDocumentPayload:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        summary:
          type: string
        folderId:
          type: integer
        categoryId:
          type: integer
        tags:
          type: array
          items:
            type: string
        status:
          $ref: '#/components/schemas/DocumentStatus'

    PublishDocumentPayload:
      type: object
      required: [title, summary, tags, visible, allowComment]
      properties:
        title:
          type: string
        summary:
          type: string
        coverUrl:
          type: string
        tags:
          type: array
          items:
            type: string
        visible:
          type: boolean
        allowComment:
          type: boolean

    ProfileSummary:
      type: object
      required: [name, email, streakDays, solvedCount]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        streakDays:
          type: integer
        solvedCount:
          type: integer

    LearningActivity:
      type: object
      required: [id, title, time, type]
      properties:
        id:
          type: string
        title:
          type: string
        time:
          type: string
        type:
          type: string
          enum: [article, chapter, problem]

    JudgeStatus:
      type: string
      enum: [PENDING, RUNNING, AC, WA, TLE, RE, CE]

    TestCaseResult:
      type: object
      required: [index, status, runtimeMs, memoryKb]
      properties:
        index:
          type: integer
        status:
          $ref: '#/components/schemas/JudgeStatus'
        runtimeMs:
          type: integer
        memoryKb:
          type: integer

    SubmissionDetail:
      type: object
      required: [id, problemId, status, runtimeMs, memoryKb, language, createdAt, testCases]
      properties:
        id:
          type: string
        problemId:
          type: string
        status:
          $ref: '#/components/schemas/JudgeStatus'
        runtimeMs:
          type: integer
        memoryKb:
          type: integer
        language:
          type: string
        createdAt:
          type: string
          format: date-time
        testCases:
          type: array
          items:
            $ref: '#/components/schemas/TestCaseResult'

    SubmissionPageResult:
      allOf:
        - $ref: '#/components/schemas/PageResultBase'
        - type: object
          properties:
            list:
              type: array
              items:
                $ref: '#/components/schemas/SubmissionDetail'

    AskAiRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
        context:
          type: object
          properties:
            route:
              type: string
            articleId:
              type: string
            documentId:
              type: integer
            problemId:
              type: string

    AiMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
          format: date-time
