worker_processes 1;
error_log stderr notice;
pid F:/software/JetBrains/IdeaProject/flowstudy/flowstudy-infra/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include F:/software/nginx-1.22.0-web/conf/mime.types;
    default_type application/octet-stream;
    access_log off;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        root F:/software/JetBrains/IdeaProject/flowstudy/flowstudy-frontend/flowstudy-web/dist;
        index index.html;

        location ^~ /api/v1/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
